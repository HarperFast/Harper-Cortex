type SynapseEntry @table {
	id: ID @primaryKey
	projectId: String @indexed
	type: String @indexed
	content: String
	source: String @indexed
	sourceFormat: String
	embedding: [Float] @indexed(type: "HNSW", distance: "cosine")
	summary: String
	status: String @indexed
	references: [String]
	tags: [String]
	entities: Any
	parentId: String @indexed
	createdAt: Date @indexed
	updatedAt: Date @indexed
	metadata: Any
}

type Memory @table {
	id: ID @primaryKey
	rawText: String
	source: String @indexed
	sourceType: String @indexed
	channelId: String @indexed
	channelName: String
	authorId: String @indexed
	authorName: String
	agentId: String @indexed
	classification: String @indexed
	entities: Any
	embedding: [Float] @indexed(type: "HNSW", distance: "cosine")
	summary: String
	timestamp: Date @indexed
	threadTs: String
	metadata: Any
}
